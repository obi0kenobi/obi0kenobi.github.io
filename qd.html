<!DOCTYPE html>
<html>
<head>
  <title>Qualified Driver Data</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background-color: #0f0f0f;
      color: white;
      text-align: center;
    }

    .navbar {
      display: flex;
      justify-content: space-between;
      padding: 15px 30px;
      background: #111;
    }

    .navbar a {
      color: #ccc;
      text-decoration: none;
      margin-left: 20px;
    }

    .navbar a:hover {
      color: white;
    }

    .content {
      padding: 50px 20px 80px;
    }

    .page-title {
      font-size: 48px;
      margin-bottom: 20px;
      color: #d84340;
    }

    .overview {
      max-width: 800px;
      margin: 30px auto 20px;
      text-align: center;
    }

    .overview h2 {
      font-size: 38px;
      margin-bottom: 15px;
      color: #f2b3b1;
    }

    .overview p {
      color: #bbb;
      margin-bottom: 10px;
      line-height: 1.6;
    }

    .overview .updated {
      color: #888;
    }

    .overview .updated b {
      color: white;
    }

    .overview::after {
      content: "";
      display: block;
      width: 60px;
      height: 2px;
      background: #d84340;
      margin: 20px auto 0;
    }

    .training-buttons {
      text-align: center;
      margin-top: 20px;
      margin-bottom: 40px;
    }

    .training-buttons a {
      text-decoration: none;
    }

    .training-buttons button {
      margin: 5px;
      padding: 8px 14px;
      border-radius: 20px;
      border: none;
      background: #2a2a2a;
      color: white;
      cursor: pointer;
      transition: 0.2s;
    }

    .training-buttons button:hover {
      background: #d84340;
    }

    .dashboard-grid {
      max-width: 1200px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: 1.05fr 0.95fr;
      gap: 25px;
      align-items: stretch;
    }

    .left-column {
      display: flex;
      flex-direction: column;
      gap: 25px;
    }

    .right-column {
      display: flex;
      flex-direction: column;
      height: 100%;
    }

    .table-box {
      padding: 30px;
      background: #1a1a1a;
      border-radius: 18px;
      text-align: left;
      width: 100%;
      box-sizing: border-box;
    }

    .right-column .table-box {
      height: 100%;
    }

    .table-box h2 {
      font-size: 34px;
      margin-bottom: 20px;
      color: #60a5fa;
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    th, td {
      padding: 14px;
      border-bottom: 1px solid rgba(255,255,255,0.08);
    }

    th {
      color: #d84340;
      font-weight: bold;
    }

    td {
      color: #ddd;
    }

    .assessor {
      color: #21d6d1;
      font-weight: bold;
    }

    .signaller {
      color: #12af86;
      font-weight: bold;
    }

    .leaderboard-table th {
      color: #d84340;
    }

    .leaderboard-name {
      font-weight: bold;
      display: inline-block;
      padding: 4px 8px;
      border-radius: 8px;
    }

    .manager {
      background: rgba(37, 99, 235, 0.22);
      color: #93c5fd;
    }

    .retired {
      background: rgba(255,255,255,0.08);
      color: #b8b8b8;
    }

    .normal-user {
      color: #ddd;
      background: transparent;
      padding: 0;
    }

    .show-more-wrap {
      text-align: center;
      margin-top: 18px;
    }

    .show-more-btn {
      padding: 8px 16px;
      border-radius: 20px;
      border: none;
      background: #2a2a2a;
      color: white;
      cursor: pointer;
    }

    .show-more-btn:hover {
      background: #d84340;
    }

    .hidden-row {
      display: none;
    }

    .chart-wrap {
      width: 100%;
      height: 320px;
      position: relative;
    }

    .chart-note {
      margin-top: 12px;
      color: #888;
      font-size: 14px;
      text-align: center;
    }

    @media (max-width: 950px) {
      .dashboard-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>

<body>

<div class="content">

  <div class="dashboard-grid">

    <!-- LEFT -->
    <div class="left-column">

      <div class="table-box">
        <h2>Role Count</h2>

        <table>
          <thead>
            <tr>
              <th>Role</th>
              <th>Total</th>
            </tr>
          </thead>
          <tbody id="role-body"></tbody>
        </table>
      </div>

      <div class="table-box">
        <h2>Monthly Trainings</h2>
        <div class="chart-wrap">
          <canvas id="monthly-trainings-chart"></canvas>
        </div>
      </div>

    </div>

    <!-- RIGHT -->
    <div class="right-column">
      <div class="table-box">
        <h2>Top Supervisors</h2>

        <table>
          <thead>
            <tr>
              <th>Position</th>
              <th>Username</th>
              <th>How many</th>
            </tr>
          </thead>
          <tbody id="leaderboard-body"></tbody>
        </table>

        <div class="show-more-wrap">
          <button id="show-more-btn" onclick="toggleMoreRows()">Show more</button>
        </div>
      </div>
    </div>

  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script>
const sheetID = "1FnnbM7oyssIdOI8DyKtx87Uqr8t1Rs2Ase3bTJYA5bw";

async function fetchRange(range) {
  const url = `https://docs.google.com/spreadsheets/d/${sheetID}/gviz/tq?tqx=out:json;headers=0&range=${range}`;
  const res = await fetch(url);
  const text = await res.text();
  return JSON.parse(text.substr(47).slice(0, -2)).table.rows;
}

/* ROLE COUNT FIX */
async function loadRoles() {
  const rows = await fetchRange("A12:B13");
  const tbody = document.getElementById("role-body");

  tbody.innerHTML = `
    <tr>
      <td class="assessor">${rows[0]?.c?.[0]?.v || "Assessor"}</td>
      <td>${rows[0]?.c?.[1]?.v || "N/A"}</td>
    </tr>
    <tr>
      <td class="signaller">${rows[1]?.c?.[0]?.v || "Signaller"}</td>
      <td>${rows[1]?.c?.[1]?.v || "N/A"}</td>
    </tr>
  `;
}

/* LEADERBOARD FIX */
async function loadLeaderboard() {
  const rows = await fetchRange("A17:C26");
  const tbody = document.getElementById("leaderboard-body");

  tbody.innerHTML = "";

  rows.forEach((row, i) => {
    const hidden = i >= 5 ? "hidden-row extra-row" : "";

    tbody.innerHTML += `
      <tr class="${hidden}">
        <td>${row.c?.[0]?.v}</td>
        <td>${row.c?.[1]?.v}</td>
        <td>${row.c?.[2]?.v}</td>
      </tr>
    `;
  });
}

/* GRAPH FIX */
async function loadChart() {
  const rows = await fetchRange("A31:B42");

  const labels = [];
  const values = [];

  rows.forEach(r => {
    if (r.c?.[0]?.v && r.c?.[1]?.v != null) {
      labels.push(r.c[0].v);
      values.push(Number(r.c[1].v));
    }
  });

  new Chart(document.getElementById("monthly-trainings-chart"), {
    type: "bar",
    data: {
      labels: labels,
      datasets: [{
        data: values,
        backgroundColor: "#d84340"
      }]
    },
    options: {
      plugins: { legend: { display: false } },
      scales: {
        x: { ticks: { color: "#ccc" } },
        y: { ticks: { color: "#ccc" }, beginAtZero: true }
      }
    }
  });
}

function toggleMoreRows() {
  document.querySelectorAll(".extra-row").forEach(r => {
    r.style.display = r.style.display === "table-row" ? "none" : "table-row";
  });
}

loadRoles();
loadLeaderboard();
loadChart();
</script>

</body>
</html>
